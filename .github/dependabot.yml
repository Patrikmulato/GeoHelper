version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      framework:
        patterns:
          - next
          - react
          - react-dom
          - react-leaflet
          - leaflet
      testing:
        patterns:
          - jest*
          - '@jest/*'
          - '@testing-library/*'
      styling:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
      linting:
        patterns:
          - eslint*
          - prettier*
          - '@eslint/*'
      git-hooks:
        patterns:
          - husky
          - lint-staged
          - '@commitlint/*'
          - commitlint*
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      testing:
        patterns:
          - supertest
          - '@types/supertest'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
