name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v0.1.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        run: pnpm --filter geoguessr-helper-backend build

      - name: Test backend
        run: pnpm --filter geoguessr-helper-backend test

      - name: Build frontend
        run: pnpm build

      - name: Package artifacts
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/frontend-next.tar.gz .next package.json pnpm-lock.yaml public
          tar -czf release-artifacts/backend-dist.tar.gz backend/dist backend/package.json

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/frontend-next.tar.gz
            release-artifacts/backend-dist.tar.gz
