name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Type check backend
        run: pnpm --filter geoguessr-helper-backend exec tsc --noEmit

      - name: Build backend
        run: pnpm --filter geoguessr-helper-backend build

      - name: Test backend
        run: pnpm --filter geoguessr-helper-backend test

      - name: Test frontend
        run: pnpm test:coverage

      - name: Build frontend
        run: pnpm build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: frontend
          name: codecov-umbrella
          fail_ci_if_error: false
